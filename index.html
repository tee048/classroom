<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new test</title>
    <link rel="stylesheet" href="mycss.css">
    <style>
        body {
            background-color: var(--color-neutral-50);
            margin: 0;
        }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background-color: var(--color-secondary-700);
            display: flex;
            justify-content: space-between;

        }

        .logo a {
            display: flex;
            /* 讓 a 標籤貼合圖片大小 */
            align-items: center;
        }

        .logo img {
            height: 100px;
            /* 1. 限制絕對高度 (配合 header 的 70px，留出上下空間) */
            width: auto;
            /* 2. 寬度設為 auto，圖片就會依照原本的長寬比自動縮放，絕不變形 */
            display: block;
            /* 3. 消除 HTML img 標籤預設自帶的底部 3px 神秘空白間隙 */
            object-fit: contain;
            /* 4. 確保整張圖片完整容納在設定的尺寸內 */
            transition: 0.3s ease;
            /* 加入滑鼠互動的轉場準備 */
        }

        .logo img:hover {
            opacity: 0.8;
            /* 滑鼠懸停時稍微降低透明度，增加互動感 */
            transform: scale(1.1);
        }

        .nav {
            display: flex;
            /* 啟動彈性佈局 */
            gap: 40px;
            /* 統一設定裡面所有連結的間距，數值越大越開 */
            align-items: center;
            /* 確保文字垂直對齊 */
        }
        .nav a {
            color: var(--color-neutral-50);
            /* 連結文字顏色 */
            text-decoration: none;
            /* 移除預設的底線 */
            font-weight: 500;
            /* 文字粗細 */
            transition: 0.3s ease;
            /* 加入滑鼠互動的轉場準備 */
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <img src="images/logo.png" alt="brand logo">
        </div>
        <div class="nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </header>

    <div class="content">
        <section id="intro">...</section>
        <section id="products">...</section>
    </div>
</body>

</html>
